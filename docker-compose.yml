services:
  mysql:
    image: mysql:8
    container_name: todo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DB_NAME:-todo_db}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: todo-redis
    ports:
      - "6380:6379"   
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
  
  # Microservices Architecture

  api-gateway:
    build: 
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "5000:5000"
    depends_on:
      - user-service
      - todo-service
      - notification-service
    environment:
      - GATEWAY_PORT=5000
      - USER_SERVICE_URL=http://user-service:5001
      - TODO_SERVICE_URL=http://todo-service:5002
      - NOTIFICATION_SERVICE_URL=http://notification-service:5003
      - ALLOWED_ORIGINS=http://localhost:5173,http://frontend
      - NODE_ENV=docker
    command: sh -c "npm install && npm start"

  user-service:
    build: 
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5001:5001"
    environment:
      - USER_SERVICE_PORT=5001
      - ALLOWED_ORIGINS=http://localhost:5000,http://api-gateway
      - NODE_ENV=docker
    command: sh -c "npm install && npm start"

  todo-service:
    build: 
      context: ./services/todo-service
      dockerfile: Dockerfile
    container_name: todo-service
    ports:
      - "5002:5002"
    depends_on:
      - notification-service
    environment:
      - TODO_SERVICE_PORT=5002
      - NOTIFICATION_SERVICE_URL=http://notification-service:5003
      - ALLOWED_ORIGINS=http://localhost:5000,http://api-gateway
      - NODE_ENV=docker
    command: sh -c "npm install && npm start"

  notification-service:
    build: 
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "5003:5003"
    environment:
      - NOTIFICATION_SERVICE_PORT=5003
      - ALLOWED_ORIGINS=http://localhost:5000,http://api-gateway
      - NODE_ENV=docker
    command: sh -c "npm install && npm start"


  backend:
    build: ./backend
    container_name: todo-backend
    ports:
      - "5004:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - NODE_ENV=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-todo_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root1234}
      - PORT=5000
      - FRONTEND_URL=http://frontend
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_ENABLED=true
    command: sh -c "sleep 10 && npm start"

  worker:
    build: ./backend
    container_name: todo-worker
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      - NODE_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_ENABLED=true
      - WORKER_CONCURRENCY=5
    command: npm run worker

  frontend:
    build: ./frontend
    container_name: todo-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend/api/todos
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  db_data:
  redis_data: