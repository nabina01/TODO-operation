services:
  mysql:
    image: mysql:8
    container_name: todo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DB_NAME:-todo_db}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: todo-backend
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - NODE_ENV=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-todo_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root1234}
      - PORT=5000
      - FRONTEND_URL=http://frontend
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "sleep 10 && npx sequelize-cli db:migrate && npm run dev"

  frontend:
    build: ./frontend
    container_name: todo-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend/api/todos
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  db_data: