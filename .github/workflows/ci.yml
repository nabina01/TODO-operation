name: CI Pipeline

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend - Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Run backend unit tests
        run: npm run test:unit

      - name: Build backend
        run: npm run build

  frontend-ci:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  docker-integration-tests:
    name: Docker - Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start MySQL container
        run: docker compose up -d mysql

      - name: Wait for MySQL healthcheck
        run: |
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' todo-mysql)
            if [ "$status" = "healthy" ]; then
              echo "MySQL is healthy"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 5
          done
          echo "MySQL did not become healthy in time"
          docker compose logs mysql
          exit 1

      - name: Run backend integration tests in Docker
        run: |
          docker compose run --rm backend sh -c "npm install && npx sequelize-cli db:migrate && npm run test:integration"

      - name: Docker cleanup
        if: always()
        run: docker compose down -v

  docker-build-bonus:
    name: Bonus - Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
