name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - backend/**

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend/backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend-ci:
    name: Frontend - Test, Build, and Push
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend unit tests
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build

      - name: Validate Docker Hub secrets
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}
        run: |
          if [ -z "$DOCKER_TOKEN" ]; then
            echo "Missing Docker token. Add DOCKERHUB_TOKEN (or DOCKER_TOKEN) in repository secrets."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: nabeena
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            nabeena/todo-operation-frontend:latest
            nabeena/todo-operation-frontend:${{ github.sha }}

  backend-ci:
    name: Backend - Test, Build, and Push
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Run backend unit tests
        run: npm run test:unit

      - name: Build backend
        run: npm run build

      - name: Validate Docker Hub secrets
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}
        run: |
          if [ -z "$DOCKER_TOKEN" ]; then
            echo "Missing Docker token. Add DOCKERHUB_TOKEN (or DOCKER_TOKEN) in repository secrets."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: nabeena
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            nabeena/todo-operation-backend:latest
            nabeena/todo-operation-backend:${{ github.sha }}
